<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Territory.io - Expanded World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #viewport {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        #game-container {
            position: absolute;
            width: 2000px; 
            height: 1500px;
            transform-origin: 0 0;
            will-change: transform;
        }
        #game-map {
            display: grid;
            grid-template-columns: repeat(200, 10px);
            grid-template-rows: repeat(150, 10px);
            background-color: #0f172a;
        }
        .tile {
            width: 10px;
            height: 10px;
            position: relative;
        }
        .tile.water { background-color: #1e3a8a; opacity: 0.6; }
        .tile.land { background-color: #0f172a; }
        .tile.owned {
            background-color: #3b82f6;
            box-shadow: inset 0 0 2px rgba(255,255,255,0.2);
            z-index: 10;
        }
        .tile.bridge {
            background-color: #78350f !important;
            border: 1px solid #451a03;
            z-index: 11;
        }
        .tile.dam {
            background-color: #06b6d4 !important;
            opacity: 1 !important;
            z-index: 12;
            box-shadow: inset 0 0 4px #fff;
        }
        .tile.dam::after {
            content: '⚡';
            font-size: 5px;
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .tile.city {
            background-color: #f59e0b !important;
            box-shadow: 0 0 8px #f59e0b;
            z-index: 15;
        }
        .tile.capital {
            background-color: #ef4444 !important;
            box-shadow: 0 0 12px #ef4444;
            z-index: 16;
        }
        .tile.city::after { content: '🏠'; font-size: 6px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .tile.capital::after { content: '👑'; font-size: 7px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .tile.building::after { content: '🏗️'; font-size: 6px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse 1s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .plane {
            position: absolute;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            transition: all 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #user-territory-label {
            position: absolute;
            pointer-events: none;
            z-index: 40;
            text-align: center;
            white-space: nowrap;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,1));
        }
        .bonus-popup {
            position: absolute;
            color: #4ade80;
            font-weight: 900;
            font-size: 10px;
            pointer-events: none;
            animation: float-up 1s ease-out forwards;
            z-index: 50;
        }
        @keyframes float-up {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-30px); opacity: 0; }
        }
        .active-btn {
            background-color: #3b82f6 !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
        
        .city-label {
            position: absolute;
            font-size: 6px;
            font-weight: bold;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 1px 2px;
            border-radius: 2px;
            pointer-events: none;
            transform: translate(-50%, -12px);
            z-index: 20;
            white-space: nowrap;
        }
        .capital-label { border: 1px solid #ef4444; color: #fca5a5; }

        #pc-profiler {
            display: none;
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            font-family: 'monospace';
            font-size: 10px;
            color: #94a3b8;
            pointer-events: none;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .profiler-row { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 2px; }
        .profiler-val { color: #38bdf8; font-weight: bold; }
        .profiler-seed { color: #fbbf24; font-weight: bold; }
    </style>
</head>
<body>

    <div id="pc-profiler">
        <div class="text-[8px] font-black uppercase text-slate-500 mb-2 border-b border-slate-700 pb-1">Advanced Profiler (PC)</div>
        <div class="profiler-row"><span>Latency:</span> <span class="profiler-val" id="prof-lat">0ms</span></div>
        <div class="profiler-row"><span>Render:</span> <span class="profiler-val" id="prof-fps">60fps</span></div>
        <div class="profiler-row"><span>Entity Count:</span> <span class="profiler-val" id="prof-ent">0</span></div>
        <div class="profiler-row border-t border-slate-700 mt-2 pt-1"><span>Tile ID:</span> <span class="profiler-val" id="prof-tile">N/A</span></div>
        <div class="profiler-row"><span>Seed:</span> <span class="profiler-seed" id="prof-seed">N/A</span></div>
        <div class="profiler-row"><span>Status:</span> <span class="profiler-val" id="prof-status">IDLE</span></div>
    </div>

    <div id="city-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[110] flex items-center justify-center p-6">
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 w-full max-w-xs shadow-2xl">
            <h2 class="text-xl font-black text-amber-500 mb-2 uppercase">Found City</h2>
            <input type="text" id="city-name-input" maxlength="10" placeholder="City Name" 
                   class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl mb-4 text-white text-center font-bold outline-none">
            <div class="flex gap-2">
                <button onclick="closeCityModal()" class="flex-1 bg-slate-700 py-3 rounded-xl font-bold text-slate-300">CANCEL</button>
                <button onclick="confirmCityBuild()" class="flex-1 bg-amber-600 py-3 rounded-xl font-black text-white shadow-lg">BUILD</button>
            </div>
        </div>
    </div>

    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-6">
        <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 w-full max-sm">
            <h1 class="text-3xl font-black text-center text-blue-500 mb-2 italic">TERRITORY.IO</h1>
            <p class="text-[8px] text-center text-slate-500 mb-6 uppercase tracking-widest font-bold">Expanded World v2.3</p>
            <input type="text" id="username-input" maxlength="12" placeholder="Commander Name" 
                   class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl mb-4 text-white text-center font-bold outline-none">
            <button onclick="startGame()" class="w-full bg-blue-600 py-4 rounded-xl font-black text-white shadow-lg active:scale-95 transition-transform">
                SPAWN
            </button>
        </div>
    </div>

    <div id="ui" class="hidden fixed inset-0 pointer-events-none z-50 p-4 flex flex-col justify-between">
        <div class="flex justify-between items-start">
            <div class="bg-slate-900/90 backdrop-blur-md p-3 rounded-2xl border border-white/5 pointer-events-auto">
                <div class="text-[8px] text-slate-500 font-black uppercase">Treasury (Max: <span id="stat-max">$0</span>)</div>
                <div class="text-lg font-mono font-black text-yellow-400" id="stat-balance">$0</div>
            </div>
            
            <div class="bg-slate-900/90 backdrop-blur-md p-3 rounded-2xl border border-white/5 pointer-events-auto text-right">
                <div class="text-[8px] text-slate-500 font-black uppercase">Cycle</div>
                <div class="text-sm font-mono font-black text-blue-400" id="cycle-timer">0.0s</div>
                <div class="w-16 h-1 bg-slate-800 rounded-full mt-1 overflow-hidden ml-auto">
                    <div id="cycle-bar" class="h-full bg-blue-500 w-0"></div>
                </div>
            </div>
        </div>

        <div class="flex flex-col items-center gap-3">
            <div id="cost-indicator" class="bg-slate-900/90 backdrop-blur-md px-4 py-2 rounded-full border border-white/10 pointer-events-auto flex gap-4 text-[7px] font-black uppercase tracking-tighter">
                <span class="text-white">Tile: <span id="stat-cost">$0</span></span>
                <span class="text-amber-300">City: <span id="stat-city-count">0</span></span>
                <span class="text-cyan-400">Dams: <span id="stat-dam-count">0</span></span>
                <span class="text-purple-400">Transport: $500</span>
            </div>
            
            <div class="flex gap-2 pointer-events-auto">
                <button id="mode-paint" onclick="setMode('paint')" class="bg-slate-800 p-4 rounded-2xl border border-white/5 active-btn transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="white" viewBox="0 0 256 256"><path d="M227.31,73.37,182.63,28.68a16,16,0,0,0-22.63,0L36.69,152A15.86,15.86,0,0,0,32,163.31V208a16,16,0,0,0,16,16H92.69A15.86,15.86,0,0,0,104,219.31L227.31,96a16,16,0,0,0,0-22.63ZM92.69,208H48V163.31L144,67.31,188.69,112ZM181,37l38,38L200,94,162,56Z"></path></svg>
                </button>
                <button id="mode-city" onclick="setMode('city')" class="bg-slate-800 p-4 rounded-2xl border border-white/5 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="white" viewBox="0 0 256 256"><path d="M240,208H224V96a16,16,0,0,0-16-16H144V40a16,16,0,0,0-16-16H48A16,16,0,0,0,32,40V208H16a8,8,0,0,0,0,16H240a8,8,0,0,0,0-16ZM48,40h80V208H48ZM144,96h64V208H144Z"></path></svg>
                </button>
                <button id="mode-transport" onclick="setMode('transport')" class="bg-slate-800 p-4 rounded-2xl border border-white/5 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="white" viewBox="0 0 256 256"><path d="M245.52,118.83l-72.78-43.67a8,8,0,0,0-8.24,0l-29.3,17.58a8,8,0,0,0-3.32,10.15l23,45.92L83.56,190.2,46.1,171.47a8,8,0,0,0-10.74,3.58L22,201.73a8,8,0,0,0,4.61,10.63l44.3,16.61a8,8,0,0,0,8.19-1.92L116,192,238.48,131a8,8,0,0,0,7-12.17Z"></path></svg>
                </button>
                <button id="mode-pan" onclick="setMode('pan')" class="bg-slate-800 p-4 rounded-2xl border border-white/5 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="white" viewBox="0 0 256 256"><path d="M200,128a8,8,0,0,1-8,8H136v56a8,8,0,0,1-16,0V136H64a8,8,0,0,1,0-16h56V64a8,8,0,0,1,16,0v56h56A8,8,0,0,1,200,128Z"></path><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="viewport">
        <div id="game-container">
            <div id="game-map"></div>
            <div id="user-territory-label">
                <div id="label-name" class="text-white font-black text-[8px] uppercase"></div>
                <div id="label-balance" class="text-yellow-400 font-mono text-[10px] font-black"></div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            TILE_SIZE: 10,
            COLS: 200,
            ROWS: 150,
            VAL_PER_TILE: 150,
            CYCLE: 10,
            BRIDGE_MULTIPLIER: 5,
            CITY_BUILD_TIME: 20000,
            CAPITAL_BONUS: 5,
            CITY_BONUS: 1,
            CITY_MAX_BONUS: 0.05, // 5% bonus per city
            DAM_BONUS: 10,
            MAX_DAMS: 100,
            TRANSPORT_COST: 500
        };

        const state = {
            username: '',
            balance: 1000,
            owned: new Set(),
            tileSeeds: [], 
            cityCount: 0,
            damIndices: new Set(),
            hasCapital: false,
            tileCost: 10,
            cycleTimer: 0,
            lastTick: Date.now(),
            mode: 'paint',
            isInteracting: false,
            panX: 0, panY: 0,
            lastTouchX: 0, lastTouchY: 0,
            pendingCityIdx: null,
            capitalPos: {x: 0, y: 0},
            isPC: !('ontouchstart' in window),
            lastFrameTime: performance.now(),
            frameCount: 0,
            fps: 0,
            lastFpsUpdate: performance.now()
        };

        const viewport = document.getElementById('viewport');
        const container = document.getElementById('game-container');
        const map = document.getElementById('game-map');
        const label = document.getElementById('user-territory-label');

        function startGame() {
            const input = document.getElementById('username-input');
            if (!input.value.trim()) return;
            state.username = input.value.trim();
            document.getElementById('label-name').innerText = state.username;
            document.getElementById('login-screen').remove();
            document.getElementById('ui').classList.remove('hidden');
            if (state.isPC) document.getElementById('pc-profiler').style.display = 'block';
            generateWorld();
            spawnCommander();
            requestAnimationFrame(gameLoop);
        }

        function generateWorld() {
            const frag = document.createDocumentFragment();
            for (let y = 0; y < CONFIG.ROWS; y++) {
                for (let x = 0; x < CONFIG.COLS; x++) {
                    const idx = y * CONFIG.COLS + x;
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.id = `t-${idx}`;
                    const noise = Math.sin(x * 0.1) * Math.cos(y * 0.1);
                    const posSeed = Math.floor(Math.random() * 90000) + 10000;
                    
                    if (noise > 0.45) {
                        state.tileSeeds[idx] = `-0,${posSeed},e3`; 
                        tile.classList.add('water');
                    } else {
                        state.tileSeeds[idx] = `-1,${posSeed},e2`; 
                        tile.classList.add('land');
                    }
                    frag.appendChild(tile);
                }
            }
            map.appendChild(frag);
        }

        function spawnCommander() {
            let validSpots = [];
            for(let i = 0; i < state.tileSeeds.length; i++) {
                if (state.tileSeeds[i].includes("e2")) validSpots.push(i);
            }
            const spawnIdx = validSpots[Math.floor(Math.random() * validSpots.length)];
            const sx = spawnIdx % CONFIG.COLS;
            const sy = Math.floor(spawnIdx / CONFIG.COLS);
            
            for(let y = 0; y < 6; y++) {
                for(let x = 0; x < 6; x++) {
                    const tx = Math.min(CONFIG.COLS - 1, Math.max(0, sx + x));
                    const ty = Math.min(CONFIG.ROWS - 1, Math.max(0, sy + y));
                    const idx = ty * CONFIG.COLS + tx;
                    if (state.tileSeeds[idx].includes("e3")) {
                        const seedParts = state.tileSeeds[idx].split(',');
                        state.tileSeeds[idx] = `-1,${seedParts[1]},e2`;
                        const el = document.getElementById(`t-${idx}`);
                        el.classList.remove('water'); el.classList.add('land');
                    }
                    claim(tx, ty, true);
                    if (x === 3 && y === 3) {
                        const el = document.getElementById(`t-${idx}`);
                        el.classList.add('capital');
                        state.tileSeeds[idx] = state.tileSeeds[idx].replace('e2', 'e2,g4,t56');
                        state.hasCapital = true;
                        state.capitalPos = {x: tx, y: ty};
                        const capLabel = document.createElement('div');
                        capLabel.className = 'city-label capital-label';
                        capLabel.innerText = state.username.toUpperCase();
                        el.appendChild(capLabel);
                    }
                }
            }
            centerCameraOn(sx, sy);
        }

        function claim(x, y, free = false) {
            const idx = y * CONFIG.COLS + x;
            if (state.owned.has(idx)) return;
            const seed = state.tileSeeds[idx];
            const isWater = seed.includes("e3");
            const currentCost = isWater ? (state.tileCost * CONFIG.BRIDGE_MULTIPLIER) : state.tileCost;
            if (!free && state.balance < currentCost) return;

            if (isWater) state.tileSeeds[idx] = seed.replace('e3', 'e3,u7');
            else state.tileSeeds[idx] = seed.replace('e2', 'e2,u7');

            state.owned.add(idx);
            const el = document.getElementById(`t-${idx}`);
            if (el) { el.classList.add('owned'); if (isWater) el.classList.add('bridge'); }
            if (!free) { state.balance -= currentCost; state.tileCost += 0.25; checkForDams(); }
            updateLabel();
        }

        function checkForDams() {
            let waterIndices = [];
            for (let i = 0; i < state.tileSeeds.length; i++) {
                if (state.tileSeeds[i].includes('e3') && !state.owned.has(i)) waterIndices.push(i);
            }
            let checked = new Set();
            let newDams = new Set();
            for (let idx of waterIndices) {
                if (checked.has(idx)) continue;
                let queue = [idx], isEnclosed = true, head = 0, cluster = [];
                checked.add(idx);
                while (head < queue.length) {
                    let curr = queue[head++];
                    cluster.push(curr);
                    let cx = curr % CONFIG.COLS, cy = Math.floor(curr / CONFIG.COLS);
                    const neighbors = [{x: cx-1, y: cy}, {x: cx+1, y: cy}, {x: cx, y: cy-1}, {x: cx, y: cy+1}];
                    for (let n of neighbors) {
                        if (n.x < 0 || n.x >= CONFIG.COLS || n.y < 0 || n.y >= CONFIG.ROWS) { isEnclosed = false; continue; }
                        let nIdx = n.y * CONFIG.COLS + n.x;
                        if (!state.owned.has(nIdx)) {
                            if (state.tileSeeds[nIdx].includes('e3')) {
                                if (!checked.has(nIdx)) { checked.add(nIdx); queue.push(nIdx); }
                            } else { isEnclosed = false; }
                        }
                    }
                }
                if (isEnclosed) cluster.forEach(i => newDams.add(i));
            }
            state.damIndices.forEach(idx => { if (!newDams.has(idx)) { document.getElementById(`t-${idx}`).classList.remove('dam'); state.tileSeeds[idx] = state.tileSeeds[idx].replace(/,r\d+/, ''); } });
            state.damIndices = newDams;
            let dCount = 1;
            state.damIndices.forEach(idx => { const el = document.getElementById(`t-${idx}`); el.classList.add('dam'); if (!state.tileSeeds[idx].includes(',r')) state.tileSeeds[idx] += `,r${dCount++}`; });
        }

        function setMode(m) {
            state.mode = m;
            ['paint','pan','city','transport'].forEach(mode => {
                document.getElementById(`mode-${mode}`).classList.toggle('active-btn', m === mode);
            });
        }

        function handleInteraction(e) {
            const touch = e.touches ? e.touches[0] : e;
            const rect = map.getBoundingClientRect();
            const x = Math.floor((touch.clientX - rect.left) / CONFIG.TILE_SIZE);
            const y = Math.floor((touch.clientY - rect.top) / CONFIG.TILE_SIZE);
            const idx = y * CONFIG.COLS + x;

            if (state.isPC && x >= 0 && x < CONFIG.COLS && y >= 0 && y < CONFIG.ROWS) {
                document.getElementById('prof-tile').innerText = `${x},${y} (#${idx})`;
                document.getElementById('prof-seed').innerText = state.tileSeeds[idx];
                document.getElementById('prof-status').innerText = state.owned.has(idx) ? 'OWNED' : 'WILD';
            }

            if (!state.isInteracting || x < 0 || x >= CONFIG.COLS || y < 0 || y >= CONFIG.ROWS) return;

            if (state.mode === 'pan') {
                state.panX += touch.clientX - state.lastTouchX;
                state.panY += touch.clientY - state.lastTouchY;
                container.style.transform = `translate(${state.panX}px, ${state.panY}px)`;
            } else if (state.mode === 'paint') {
                const neighbors = [idx-1, idx+1, idx-CONFIG.COLS, idx+CONFIG.COLS];
                if (!state.owned.has(idx) && neighbors.some(n => state.owned.has(n))) claim(x, y);
            } else if (state.mode === 'city') {
                if (state.owned.has(idx) && state.tileSeeds[idx].includes('e2') && !state.tileSeeds[idx].includes('g4')) {
                    state.isInteracting = false; openCityModal(idx);
                }
            } else if (state.mode === 'transport') {
                state.isInteracting = false; sendTransport(idx);
            }
            state.lastTouchX = touch.clientX; state.lastTouchY = touch.clientY;
        }

        function openCityModal(idx) {
            state.pendingCityIdx = idx;
            document.getElementById('city-modal').classList.remove('hidden');
            document.getElementById('city-name-input').focus();
        }

        function closeCityModal() { document.getElementById('city-modal').classList.add('hidden'); state.pendingCityIdx = null; }

        function confirmCityBuild() {
            const name = document.getElementById('city-name-input').value.trim();
            if (!name || state.pendingCityIdx === null) return;
            const idx = state.pendingCityIdx;
            const el = document.getElementById(`t-${idx}`);
            el.classList.add('building');
            state.tileSeeds[idx] = state.tileSeeds[idx].replace('e2', 'e2,g4-build');
            closeCityModal();
            setTimeout(() => {
                el.classList.remove('building'); el.classList.add('city');
                state.tileSeeds[idx] = state.tileSeeds[idx].replace('g4-build', 'g4'); 
                state.cityCount++;
                const nameTag = document.createElement('div');
                nameTag.className = 'city-label'; nameTag.innerText = name;
                el.appendChild(nameTag);
            }, CONFIG.CITY_BUILD_TIME);
        }

        function centerCameraOn(x, y) {
            state.panX = (window.innerWidth / 2) - (x * CONFIG.TILE_SIZE);
            state.panY = (window.innerHeight / 2) - (y * CONFIG.TILE_SIZE);
            container.style.transform = `translate(${state.panX}px, ${state.panY}px)`;
        }

        function sendTransport(targetIdx) {
            if (state.balance < CONFIG.TRANSPORT_COST) return;
            const tx = targetIdx % CONFIG.COLS, ty = Math.floor(targetIdx / CONFIG.COLS);
            if (state.owned.has(targetIdx) || state.tileSeeds[targetIdx].includes('e3')) return;
            state.balance -= CONFIG.TRANSPORT_COST;
            const plane = document.createElement('div');
            plane.className = 'plane'; plane.innerText = '✈️';
            plane.style.left = `${state.capitalPos.x * CONFIG.TILE_SIZE}px`;
            plane.style.top = `${state.capitalPos.y * CONFIG.TILE_SIZE}px`;
            container.appendChild(plane);
            setTimeout(() => { plane.style.left = `${tx * CONFIG.TILE_SIZE}px`; plane.style.top = `${ty * CONFIG.TILE_SIZE}px`; }, 50);
            setTimeout(() => { claim(tx, ty, true); plane.remove(); }, 2000);
        }

        function gameLoop(timestamp) {
            const delta = timestamp - state.lastFrameTime;
            state.lastFrameTime = timestamp;
            state.frameCount++;

            if (timestamp - state.lastFpsUpdate > 1000) {
                state.fps = Math.round((state.frameCount * 1000) / (timestamp - state.lastFpsUpdate));
                state.frameCount = 0;
                state.lastFpsUpdate = timestamp;
                if (state.isPC) {
                    document.getElementById('prof-lat').innerText = `${Math.round(delta)}ms`;
                    document.getElementById('prof-fps').innerText = `${state.fps}fps`;
                    document.getElementById('prof-ent').innerText = state.owned.size + state.cityCount;
                }
            }

            const now = Date.now();
            if (now - state.lastTick >= 1000) {
                state.lastTick = now;
                
                // Max Balance Calculation: Base (Tiles) + 5% Multiplier per City
                const baseMax = state.owned.size * CONFIG.VAL_PER_TILE;
                const cityMultiplier = 1 + (state.cityCount * CONFIG.CITY_MAX_BONUS);
                const maxBalance = baseMax * cityMultiplier;
                
                const rate = Math.max(0.01, 0.07 - (0.06/0.69)*((state.balance/maxBalance)-0.01));
                const income = state.owned.size + (state.balance * rate) + (state.cityCount * CONFIG.CITY_BONUS) + (state.hasCapital ? CONFIG.CAPITAL_BONUS : 0) + (state.damIndices.size * CONFIG.DAM_BONUS);
                
                state.balance = Math.min(maxBalance, state.balance + income);
                state.cycleTimer++;
                if (state.cycleTimer >= CONFIG.CYCLE) {
                    const bonus = income + (state.owned.size * 2);
                    state.balance = Math.min(maxBalance, state.balance + bonus);
                    state.cycleTimer = 0;
                    spawnPop(bonus);
                }
                updateUI(maxBalance);
            }
            requestAnimationFrame(gameLoop);
        }

        function spawnPop(amt) {
            const p = document.createElement('div');
            p.className = 'bonus-popup'; p.innerText = `+$${Math.floor(amt)}`;
            p.style.left = label.style.left; p.style.top = label.style.top;
            container.appendChild(p);
            setTimeout(() => p.remove(), 1000);
        }

        function updateUI(maxVal) {
            document.getElementById('stat-balance').innerText = `$${Math.floor(state.balance).toLocaleString()}`;
            document.getElementById('stat-max').innerText = `$${Math.floor(maxVal).toLocaleString()}`;
            document.getElementById('stat-cost').innerText = `$${Math.floor(state.tileCost)}`;
            document.getElementById('stat-city-count').innerText = state.cityCount;
            document.getElementById('stat-dam-count').innerText = state.damIndices.size;
            document.getElementById('cycle-timer').innerText = `${state.cycleTimer}.0s`;
            document.getElementById('cycle-bar').style.width = `${(state.cycleTimer / 10) * 100}%`;
            document.getElementById('label-balance').innerText = `$${Math.floor(state.balance).toLocaleString()}`;
        }

        function updateLabel() {
            if (state.owned.size === 0) return;
            let minX = CONFIG.COLS, maxX = 0, minY = CONFIG.ROWS, maxY = 0;
            state.owned.forEach(idx => {
                const x = idx % CONFIG.COLS, y = Math.floor(idx / CONFIG.COLS);
                minX = Math.min(minX, x); maxX = Math.max(maxX, x);
                minY = Math.min(minY, y); maxY = Math.max(maxY, y);
            });
            label.style.left = `${((minX + maxX + 1) / 2) * CONFIG.TILE_SIZE}px`;
            label.style.top = `${((minY + maxY + 1) / 2) * CONFIG.TILE_SIZE}px`;
            label.style.transform = `translate(-50%, -50%)`;
        }

        const start = (e) => { 
            state.isInteracting = true; 
            const touch = e.touches ? e.touches[0] : e;
            state.lastTouchX = touch.clientX; state.lastTouchY = touch.clientY;
            handleInteraction(e); 
        };
        viewport.addEventListener('mousedown', start);
        window.addEventListener('mousemove', handleInteraction);
        window.addEventListener('mouseup', () => state.isInteracting = false);
        viewport.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('touchmove', (e) => { e.preventDefault(); handleInteraction(e); }, {passive: false});
        window.addEventListener('touchend', () => state.isInteracting = false);
    </script>
</body>
</html>
